<!DOCTYPE html>
<html>
<head>
  <title>Add Job</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f6f8;
      text-align: center;
      padding: 40px;
    }

    h2 {
      color: #333;
    }

    form {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    input, select {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
    }

    button {
      padding: 10px 15px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      color: #007bff;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <h2>Add Job</h2>

  <form>
    <input type="text" placeholder="Company"><br>
    <input type="text" placeholder="Role"><br>

    <select>
      <option>Applied</option>
      <option>Interview</option>
      <option>Rejected</option>
    </select><br>

    <button type="submit">Add Job</button>
  </form>

  <a href="dashboard.html">Back to Dashboard</a>

</body>
</html>
