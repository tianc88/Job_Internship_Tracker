<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f6f8;
      text-align: center;
      padding: 40px;
    }

    h1, h2 {
      color: #333;
    }

    p {
      color: #555;
    }

    a {
      display: inline-block;
      margin: 10px;
      padding: 10px 15px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    a:hover {
      background-color: #0056b3;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin: 10px auto;
      padding: 12px;
      width: 220px;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
      font-weight: bold;
    }

    h3 {
      margin-top: 20px;
      color: #333;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
      text-align: center;
      overflow: hidden;
    }

    th, td {
      padding: 10px 15px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #007bff;
      color: white;
    }

    hr {
      margin: 30px;
    }
  </style>
</head>

<body>

  <h1>Internship / Job Tracker</h1>

  <h2>Dashboard</h2>
  <p>Track your job applications</p>

  <ul>
    <li>Applied: 2</li>
    <li>Interview: 1</li>
    <li>Rejected: 0</li>
  </ul>

  <hr>

  <h3>Recent Applications</h3>

  <table>
    <tr>
      <th>Company</th>
      <th>Role</th>
      <th>Status</th>
    </tr>
    <tr>
      <td>Google</td>
      <td>Software Intern</td>
      <td>Applied</td>
    </tr>
    <tr>
      <td>Amazon</td>
      <td>SDE Intern</td>
      <td>Interview</td>
    </tr>
  </table>

  <hr>

  <a href="add.html">Add New Job</a>
  <a href="index.html">Back to Home</a>

</body>
</html>
